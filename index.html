<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R-StoreId</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0000FF; 
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .solid-card {
            background-color: #ffffff;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .solid-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="antialiased selection:bg-white selection:text-blue-600">

    <div class="max-w-6xl mx-auto px-4 py-10 relative z-10">
        
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-7xl font-bold mb-1 tracking-tight" style="font-family: 'Space Grotesk'">
                <span class="text-white">R - STORE</span>
            </h1>
            
            <p class="text-[10px] md:text-xs font-bold tracking-[0.4em] text-white uppercase mb-4 opacity-90">
                MEDIA DATA
            </p>

            <p class="text-white text-xs font-light" id="status-text">Menunggu sambungan server...</p>
        </div>

        <div class="flex justify-center gap-3 mb-8">
            <button id="btn-xla" onclick="switchTab('xla')" class="px-6 py-2 rounded-full font-bold text-sm transition-all duration-300 bg-white text-blue-600 shadow-lg flex items-center gap-2">
                <span id="dot-xla" class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span> AKRAB XLA
            </button>
            <button id="btn-xda" onclick="switchTab('xda')" class="px-6 py-2 rounded-full font-bold text-sm transition-all duration-300 bg-white/20 text-white border border-white/30 hover:bg-white/30 flex items-center gap-2">
                <span id="dot-xda" class="w-2 h-2 rounded-full bg-transparent"></span> AKRAB XDA
            </button>
        </div>

        <div id="container-xla" class="block fade-in">
            <div id="grid-xla" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-6">
                <div class="col-span-full text-center py-10 text-white/50 text-xs tracking-widest uppercase font-mono loading-indicator">
                    <i class="fa-solid fa-circle-notch fa-spin text-xl mb-2"></i><br>Memuat XLA...
                </div>
            </div>
        </div>

        <div id="container-xda" class="hidden fade-in">
            <div id="grid-xda" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-6">
                <div class="col-span-full text-center py-10 text-white/50 text-xs tracking-widest uppercase font-mono loading-indicator">
                    <i class="fa-solid fa-circle-notch fa-spin text-xl mb-2"></i><br>Memuat XDA...
                </div>
            </div>
        </div>

        <footer class="mt-16 text-center border-t border-white/20 pt-8">
            <p class="text-white text-[10px] tracking-wider opacity-90">© R-STORE media id 2025</p>
        </footer>
    </div>

    <script>
        const apiUrl = '/api/proxy'; 
        const statusText = document.getElementById('status-text');

        // Fungsi untuk ganti tab
        function switchTab(tab) {
            const btnXla = document.getElementById('btn-xla');
            const btnXda = document.getElementById('btn-xda');
            const dotXla = document.getElementById('dot-xla');
            const dotXda = document.getElementById('dot-xda');
            const containerXla = document.getElementById('container-xla');
            const containerXda = document.getElementById('container-xda');

            if (tab === 'xla') {
                // Tampilkan XLA, sembunyikan XDA
                containerXla.classList.remove('hidden');
                containerXla.classList.add('block');
                containerXda.classList.remove('block');
                containerXda.classList.add('hidden');

                // Style Tombol Aktif XLA
                btnXla.className = 'px-6 py-2 rounded-full font-bold text-sm transition-all duration-300 bg-white text-blue-600 shadow-lg flex items-center gap-2';
                dotXla.className = 'w-2 h-2 rounded-full bg-blue-500 animate-pulse';
                
                // Style Tombol Non-aktif XDA
                btnXda.className = 'px-6 py-2 rounded-full font-bold text-sm transition-all duration-300 bg-white/20 text-white border border-white/30 hover:bg-white/30 flex items-center gap-2';
                dotXda.className = 'w-2 h-2 rounded-full bg-transparent';
            } else {
                // Tampilkan XDA, sembunyikan XLA
                containerXda.classList.remove('hidden');
                containerXda.classList.add('block');
                containerXla.classList.remove('block');
                containerXla.classList.add('hidden');

                // Style Tombol Aktif XDA
                btnXda.className = 'px-6 py-2 rounded-full font-bold text-sm transition-all duration-300 bg-white text-blue-600 shadow-lg flex items-center gap-2';
                dotXda.className = 'w-2 h-2 rounded-full bg-blue-500 animate-pulse';

                // Style Tombol Non-aktif XLA
                btnXla.className = 'px-6 py-2 rounded-full font-bold text-sm transition-all duration-300 bg-white/20 text-white border border-white/30 hover:bg-white/30 flex items-center gap-2';
                dotXla.className = 'w-2 h-2 rounded-full bg-transparent';
            }
        }

        async function fetchData() {
            try {
                const res = await fetch(apiUrl + '?t=' + new Date().getTime());
                if (!res.ok) throw new Error("Server error");
                
                const json = await res.json();

                if (json.ok) {
                    renderData(json.xla, 'grid-xla');
                    renderData(json.xda, 'grid-xda');
                    
                    const time = new Date().toLocaleTimeString('id-ID');
                    statusText.innerHTML = `<span class="text-white font-medium text-xs"><i class="fa-solid fa-wifi mr-1"></i>Updated: ${time}</span>`;
                }
            } catch (err) {
                console.error(err);
                statusText.innerHTML = `<span class="text-rose-200 font-medium text-xs"><i class="fa-solid fa-rotate mr-1 animate-spin"></i>Retrying...</span>`;
            }
        }

        function renderData(items, targetGridId) {
            const grid = document.getElementById(targetGridId);
            const isFirstRender = grid.querySelector('.loading-indicator') !== null;

            if (isFirstRender) {
                grid.innerHTML = ''; 
            }

            if (!items || items.length === 0) {
                if (grid.innerHTML === '') {
                    grid.innerHTML = `<div class="col-span-full text-center py-4 text-white/50 text-xs tracking-widest uppercase">Kosong</div>`;
                }
                return;
            }

            items.forEach((item, index) => {
                const stock = parseInt(item.sisa_slot);
                const isAvail = stock > 0;
                
                const safeId = item.nama.replace(/\s+/g, '-');
                const cardId = `card-${targetGridId}-${safeId}`;
                const stockId = `stock-${targetGridId}-${safeId}`;
                const statusId = `status-${targetGridId}-${safeId}`;
                const iconId = `icon-${targetGridId}-${safeId}`;
                const iconWrapperId = `icon-wrap-${targetGridId}-${safeId}`;

                const color = isAvail ? 'text-emerald-600' : 'text-rose-600';
                const bgIcon = isAvail ? 'bg-emerald-100 border-emerald-200' : 'bg-rose-100 border-rose-200';
                const iconClass = isAvail ? 'fa-box-open' : 'fa-lock';
                const badge = isAvail 
                    ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' 
                    : 'bg-rose-100 text-rose-700 border border-rose-200';
                const statusLabel = isAvail ? 'READY' : 'SOLD';
                
                const existingCard = document.getElementById(cardId);

                if (existingCard) {
                    const stockEl = document.getElementById(stockId);
                    if (stockEl.innerText != stock) {
                        stockEl.innerText = stock;
                        stockEl.className = `text-2xl md:text-4xl font-bold ${color}`; 
                    }

                    const statusEl = document.getElementById(statusId);
                    if (statusEl.innerText !== statusLabel) {
                        statusEl.innerText = statusLabel;
                        statusEl.className = `px-2 py-1 rounded text-[9px] font-bold tracking-wider ${badge}`;
                    }

                    const iconWrap = document.getElementById(iconWrapperId);
                    iconWrap.className = `h-8 w-8 min-w-[2rem] rounded-md ${bgIcon} border flex items-center justify-center ml-2 transition-colors duration-500`;
                    
                    const iconEl = document.getElementById(iconId);
                    iconEl.className = `fa-solid ${iconClass} ${color} text-xs transition-colors duration-500`;

                } else {
                    const delay = index * 50;
                    
                    const html = `
                    <div id="${cardId}" class="solid-card p-4 relative overflow-hidden group fade-in flex flex-col justify-between h-full" style="animation-delay: ${delay}ms">
                        
                        <div class="flex justify-between items-start mb-3">
                            <div class="overflow-hidden">
                                <p class="text-[9px] font-bold tracking-widest text-slate-500 uppercase mb-1 font-mono truncate">${item.type || 'DATA'}</p>
                                <h3 class="text-sm md:text-xl font-bold text-slate-800 group-hover:text-blue-600 transition-colors truncate" title="${item.nama}">${item.nama}</h3>
                            </div>
                            <div id="${iconWrapperId}" class="h-8 w-8 min-w-[2rem] rounded-md ${bgIcon} border flex items-center justify-center ml-2">
                                <i id="${iconId}" class="fa-solid ${iconClass} ${color} text-xs"></i>
                            </div>
                        </div>
                        
                        <div class="h-px w-full bg-slate-200 my-2"></div>

                        <div class="flex items-end justify-between gap-1">
                            <div>
                                <p class="text-[10px] text-slate-500 mb-0.5 font-medium">Stok</p>
                                <div class="flex items-baseline">
                                    <span id="${stockId}" class="text-2xl md:text-4xl font-bold ${color}" style="font-family: 'Space Grotesk'">${stock}</span>
                                </div>
                            </div>
                            <div id="${statusId}" class="px-2 py-1 rounded text-[9px] font-bold tracking-wider ${badge}">
                                ${statusLabel}
                            </div>
                        </div>
                    </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', html);
                }
            });
        }

        fetchData();
        setInterval(fetchData, 1000); 
    </script>
</body>
</html>
